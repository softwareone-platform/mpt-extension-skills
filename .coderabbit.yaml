# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en"
tone_instructions: ""
early_access: true
enable_free_tier: true
inheritance: true
reviews:
  profile: "chill"
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_instructions: |
    1. Extract the Jira issue key from the PR title (format: MPT-XXXX).
    2. If an issue key is found, start the summary with: "Closes [MPT-XXXX](https://softwareone.atlassian.net/browse/MPT-XXXX)" where MPT-XXXX is replaced with the actual issue key.
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: false
  auto_title_placeholder: "@coderabbitai"
  auto_title_instructions: ""
  review_status: true
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: false
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: false
  related_prs: true
  suggested_labels: false
  labeling_instructions: []
  auto_apply_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  in_progress_fortune: false
  poem: false
  enable_prompt_for_ai_agents: true
  path_filters:
    - "!.gitignore"
  path_instructions:
    - path: "**/*"
      instructions: |
        For each subsequent commit in this PR, explicitly verify if previous review comments have been resolved
    - path: "docs/**"
      instructions: |
        Review documentation changes against `standards/documentation.md` and `docs/documentation.md`.
        Use those documents as the source of truth for structure, topic boundaries, navigation updates, and when to link shared rules instead of copying them.
    - path: "make/**"
      instructions: |
        Review changes in `make/` against `standards/makefiles.md`.
        Use that document as the source of truth for Makefile architecture, file layout, and command-group organization.
    - path: "standards/**"
      instructions: |
        Review shared standards for overlap, duplication, and copy-paste between documents.
        Prefer links and cross-references between standard documents instead of restating another standard's rules.
    - path: "knowledge/**"
      instructions: |
        Review knowledge documents as reusable operational guidance.
        When policy or rules already live in `standards/`, use those standards documents as the source of truth and ensure knowledge docs link to them instead of copying them.
    - path: "skills/**"
      instructions: |
        Review skill changes against `standards/skills.md`.
        Use that document as the source of truth for skill naming, scope, type, structure, required files, and local shared references.
  abort_on_close: true
  disable_cache: false
  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords: []
    labels: []
    drafts: false
    ignore_usernames: ["dependabot[bot]"]
    base_branches:
      - main
      - release/.*
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
  pre_merge_checks:
    docstrings:
      mode: off
    title:
      mode: off
    description:
      mode: off
    issue_assessment:
      mode: warning
    custom_checks:
      - name: "PR And Commit Formatting"
        mode: "error"
        instructions: |
          Validate PR and commit formatting against `standards/pull-requests.md` and `standards/commit-messages.md`.
          Use those documents as the source of truth and verify all applicable requirements except Rule 8 from `standards/pull-requests.md`, which is checked separately.
          Verify:
          - PR title
          - PR description
          - commit titles
          - commit descriptions
          - commit count and history structure
          - linear history expectations
          Fail the check when any of those requirements do not comply.
      - name: "AI Warning Line In PR Description"
        mode: "error"
        instructions: |
          Check Rule 8 from `standards/pull-requests.md` deterministically.
          Use that rule as the source of truth for the AI warning line requirement in the PR description.
  tools:
    ast-grep:
      rule_dirs: []
      util_dirs: []
      essential_rules: true
      packages: []
    shellcheck:
      enabled: true
    ruff:
      enabled: false
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
    languagetool:
      enabled: true
      enabled_rules: []
      disabled_rules: []
      enabled_categories: []
      disabled_categories: []
      enabled_only: false
      level: default
    biome:
      enabled: false
    hadolint:
      enabled: false
    swiftlint:
      enabled: false
    phpstan:
      enabled: false
      level: default
    phpmd:
      enabled: false
    phpcs:
      enabled: false
    golangci-lint:
      enabled: false
    yamllint:
      enabled: true
    gitleaks:
      enabled: true
    checkov:
      enabled: false
    detekt:
      enabled: false
    eslint:
      enabled: false
    flake8:
      enabled: false
    fortitudeLint:
      enabled: false
    rubocop:
      enabled: false
    buf:
      enabled: false
    regal:
      enabled: false
    actionlint:
      enabled: false
    pmd:
      enabled: false
    clang:
      enabled: false
    cppcheck:
      enabled: false
    semgrep:
      enabled: true
    opengrep:
      enabled: false
    circleci:
      enabled: false
    clippy:
      enabled: false
    sqlfluff:
      enabled: false
    stylelint:
      enabled: false
    prismaLint:
      enabled: false
    pylint:
      enabled: false
    psscriptanalyzer:
      enabled: false
    oxc:
      enabled: false
    shopifyThemeCheck:
      enabled: false
    smartyLint:
      enabled: false
    luacheck:
      enabled: false
    brakeman:
      enabled: false
    blinter:
      enabled: false
    dotenvLint:
      enabled: false
    htmlhint:
      enabled: false
    checkmake:
      enabled: true
    osvScanner:
      enabled: true
    trufflehog:
      enabled: false
    tflint:
      enabled: false
    trivy:
      enabled: false
    emberTemplateLint:
      enabled: false
chat:
  art: false
  auto_reply: true
  integrations:
    jira:
      usage: auto
    linear:
      usage: disabled
knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - "AGENTS.md"
      - "standards/*.md"
  learnings:
    scope: auto
  issues:
    scope: auto
  jira:
    usage: enabled
    project_keys:
      - MPT
  pull_requests:
    scope: auto
  mcp:
    usage: auto
    disabled_servers: []
