name: Release
run-name: Release v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without v prefix, for example 1.2.3
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          case "${VERSION}" in
            v*)
              echo "Version input must not start with v" >&2
              exit 1
              ;;
            *[!0-9.]*|'')
              echo "Version must contain only digits and dots" >&2
              exit 1
              ;;
          esac

      - name: Build release assets
        env:
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p dist/package
          cp -R scripts skills standards knowledge docs README.md LICENSE dist/package/
          printf '{"name":"mpt-extension-skills","version":"%s","source_repo":"softwareone-platform/mpt-extension-skills","source_commit":"%s","source_type":"release"}\n' \
            "${VERSION}" \
            "${GITHUB_SHA}" \
            > dist/package/manifest.json
          tar -C dist/package -czf "dist/mpt-extension-skills-${VERSION}.tar.gz" .
          sed "s/__MPT_SKILLS_RELEASE_VERSION__/${VERSION}/g" scripts/mpt-extensions-skills-install.sh > dist/mpt-extensions-skills-install.sh
          chmod +x dist/mpt-extensions-skills-install.sh
          shasum -a 256 "dist/mpt-extension-skills-${VERSION}.tar.gz" dist/mpt-extensions-skills-install.sh > dist/SHA256SUMS

      - name: Create annotated tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          existing_tag_commit="$(git ls-remote --tags origin "refs/tags/${VERSION}^{}" | awk '{print $1}')"
          if [ -z "${existing_tag_commit}" ]; then
            existing_tag_commit="$(git ls-remote --tags origin "refs/tags/${VERSION}" | awk '{print $1}')"
          fi

          if [ -n "${existing_tag_commit}" ]; then
            if [ "${existing_tag_commit}" = "${GITHUB_SHA}" ]; then
              echo "Tag ${VERSION} already exists for ${GITHUB_SHA}; skipping tag creation"
              exit 0
            fi

            echo "Tag ${VERSION} already exists for ${existing_tag_commit}, expected ${GITHUB_SHA}" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION}" -m "v${VERSION}" "${GITHUB_SHA}"
          git push origin "refs/tags/${VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists; uploading assets"
            gh release upload "${VERSION}" \
              dist/mpt-extensions-skills-install.sh \
              "dist/mpt-extension-skills-${VERSION}.tar.gz" \
              dist/SHA256SUMS \
              --clobber
          else
            gh release create "${VERSION}" \
              dist/mpt-extensions-skills-install.sh \
              "dist/mpt-extension-skills-${VERSION}.tar.gz" \
              dist/SHA256SUMS \
              --title "v${VERSION}" \
              --generate-notes \
              --verify-tag
          fi
